<!DOCTYPE html>
<html>
<head>
    <title>Survey results</title>
    <script src="https://cdn.jsdeliver.net/npm/chart.js"></script>
</head>
<body>

    <h1>Survey results (pie chart)</h1>
    <div id="chartsContainer"></div>

    <script> src= "https://cdn.jsdeliver.net/npm/chart.js"</script>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasedjs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasedjs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDvmz2S5WrvvHxJtN0c-1qaCHOyOAUBIm8",  
         authDomain: "diabetes-and-obesity-project.firebaseapp.com",
         projectId: "diabetes-and-obesity-project",
         StorageBucket: "diabetes-and-obesity-project.appspot.com",
         messageSenderId: "666182693245",
         appId: "1:666182693245:web:867fbd1221565471141c14",
         measurmentId: "G-JYYP26ZFSB"};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

        async function loadChart() {
            const container = document.getElementById("chartsContainer");

            const snapshot = await getDocs(collection(db, "responses"));
            const data = snapshot.docs.map(doc => doc.data());

            if( data.length ===0 ) {
                document.body.innerHTML = "<h2>No responses yet</h2>";
                return;
            }
            //get all question keys
            const keys = Object.keys(data[0]);

            keys.forEach(key =>{
                const counts = {};

                //count answers for this question
                data.forEach(respone => {
                    const answer = respone[key];
                    counts[answer] = (counts[answer] || 0) + 1;
                });
                const labels = Object.keys(counts);
                const values = Object.values(counts);
                //create title
                const title = document.create.Element("h3");
                title.textContent = key;
                container.appendChild(title);

                //create canvas
                const canvas = document.createElement("canvas");
                container.appendChild(canvas);

                // create chart
                new Chart(canvas, {
                    type: "pie",
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values
                        }]
                    }
                });
            });
        }

    loadChart();
    </script>
</body>
</html>
