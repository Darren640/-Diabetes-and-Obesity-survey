<!DOCTYPE html>
<html>
<head>
    <title>Survey results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Survey results (pie chart)</h1>
    <div id="chartsContainer"></div>

    <script>
        async function loadChart() {
            const container = document.getElementById("chartsContainer");

            try {
                const resp = await fetch("/responses?password=survey2026");
                if (!resp.ok) {
                    throw new Error(`Could not load responses: ${resp.status}`);
                }
                const data = await resp.json();

                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = "<h2>No responses yet</h2>";
                    return;
                }

                const keys = Object.keys(data[0]);

                keys.forEach(key => {
                    const counts = {};
                    data.forEach(entry => {
                        const answer = entry[key] || "(no answer)";
                        counts[answer] = (counts[answer] || 0) + 1;
                    });

                    const labels = Object.keys(counts);
                    const values = Object.values(counts);

                    const title = document.createElement("h3");
                    title.textContent = key;
                    container.appendChild(title);

                    const canvas = document.createElement("canvas");
                    container.appendChild(canvas);

                    new Chart(canvas.getContext("2d"), {
                        type: "pie",
                        data: {
                            labels,
                            datasets: [{
                                data: values,
                                backgroundColor: labels.map((_, i) => `hsl(${(i*45)%360}, 70%, 60%)`)
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                        }
                    });
                });
            } catch (err) {
                container.innerHTML = `<h2>Error loading responses: ${err.message}</h2>`;
                console.error(err);
            }
        }

        loadChart();
    </script>
</body>
</html>
