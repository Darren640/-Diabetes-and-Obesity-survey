<!DOCTYPE html>
<html>
<head>
    <title>Survey results</title>
    <script src="https://cdn.jsdeliver.net/npm/chart.js"></script>
</head>
<body>

    <h1>Survey results (pie chart)</h1>
    <div id="chartsContainer"></div>

    <script> src= "https://cdn.jsdeliver.net/npm/chart.js"</script>

    <script>
        async function loadChart() {
            const password = prompt("Enter admin password:");
            const res = await fetch(`/responses?password=${password}`);
            
            if(!res.ok) {
                document.body.innerHTML= "<h2>Access denied</h2>";
                return;
            }
            const data = await res.json();

            if( data.length ===0 ) {
                document.body.innerHTML = "<h2>No responses yet</h2>";
                return;
            }
            const container  = document.getElementById("chartsContainer");
            //get all question keys
            const keys = Object.keys(data[0]);

            keys.forEach(key =>{
                const counts = {};

                //count answers for this question
                data.forEach(respone => {
                    const answer = respone[key];
                    counts[answer] = (counts[answer] || 0) + 1;
                });
                const labels = Object.keys(counts);
                const values = Object.values(counts);
                //create title
                const title = document.create.Element("h3");
                title.textContent = key;
                container.appendChild(title);

                //create canvas
                const canvas = document.createElement("canvas");
                container.appendChild(canvas);

                // create chart
                new Chart(canvas, {
                    type: "pie",
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values
                        }]
                    }
                });
            });
        }

    loadChart();
    </script>
</body>
</html>
